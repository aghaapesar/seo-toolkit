<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} - Seo Toolkit</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>URL Index Diff</h1>
    <p><a href="/">Back to dashboard</a></p>
  </header>
  <main>
    <form class="card" method="post" action="/index-diff">
      <label>Domain / project name
        <input type="text" name="domain" required placeholder="example.com" />
      </label>
      <label>Sitemap URL
        <input type="url" name="sitemap_url" required placeholder="https://example.com/sitemap.xml" />
      </label>
      <label class="checkbox">
        <input type="hidden" name="mark_submitted" value="false" />
        <input type="checkbox" name="mark_submitted" value="true" />
        Mark new URLs as submitted after export
      </label>
      <button type="submit">Run diff</button>
    </form>
  </main>
</body>
</html>
